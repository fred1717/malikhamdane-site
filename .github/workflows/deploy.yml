# ---------------------------------------------------------------------------
# Deploy static site to S3 and invalidate CloudFront cache
# ---------------------------------------------------------------------------

name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'scripts/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build site
        run: python scripts/build.py

      - name: Sync site to S3
        run: aws s3 sync build/ "s3://${{ vars.S3_BUCKET_NAME }}" --delete --exact-timestamps

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
