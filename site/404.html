<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Malik Hamdane</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            color: #212529;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #adb5bd;
        }

        .messages {
            margin-bottom: 2rem;
        }

        .messages p {
            font-size: 1rem;
            color: #495057;
            margin-bottom: 0.4rem;
        }

        .languages {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .languages a {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            text-decoration: none;
            color: #212529;
            background-color: #ffffff;
            transition: background-color 0.2s;
        }

        .languages a:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <div class="messages">
            <p>Page not found.</p>
            <p>Page introuvable.</p>
            <p>Seite nicht gefunden.</p>
            <p>Página no encontrada.</p>
            <p>Página não encontrada.</p>
            <p>Страница не найдена.</p>
        </div>
        <div class="languages">
            <a href="/fr/">Français</a>
            <a href="/en/">English</a>
            <a href="/de/">Deutsch</a>
            <a href="/es/">Español</a>
            <a href="/pt/">Português</a>
            <a href="/ru/">Русский</a>
        </div>
    </div>
</body>
</html>
